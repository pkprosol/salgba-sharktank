services:
  - type: web
    name: salgba-sharktank
    runtime: static
    buildCommand: ""
    staticPublishPath: ./public
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
